<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學科知識地圖 · Marble Taxonomy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a;
    --bg-edge:#050710;
    --ink:#e8ecfa;
    --dust:#6b7694;
    --cyan:#00e5ff;
    --magenta:#ff2fb8;
    --violet:#8b7bff;
    --lime:#baff29;
    --amber:#ffb020;
    --coral:#ff6b6b;
    --teal:#2de0c2;
    --panel-bg:rgba(9,13,24,0.86);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'JetBrains Mono', monospace;
    color:var(--ink);
  }
  body{
    background-image:
      linear-gradient(rgba(139,123,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,123,255,0.05) 1px, transparent 1px),
      radial-gradient(circle at 20% 15%, rgba(0,229,255,0.08) 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(255,47,184,0.07) 0%, transparent 45%);
    background-size: 32px 32px, 32px 32px, auto, auto;
  }
  #stage{ width:100vw; height:100vh; display:block; cursor:grab; }
  #stage:active{ cursor:grabbing; }

  .hand{ font-family:'Space Grotesk', sans-serif; font-weight:700; letter-spacing:0.01em; }

  #header{
    position:fixed; top:0; left:0; right:0;
    padding:18px 24px 12px;
    pointer-events:none;
    z-index:10;
    background:linear-gradient(180deg, var(--bg-edge)f0 0%, transparent 100%);
  }
  #header h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 2px 0;
    background:linear-gradient(90deg, var(--cyan), var(--violet) 60%, var(--magenta));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:0.01em;
  }
  #header p{
    margin:0;
    font-size:11px;
    color:var(--dust);
    letter-spacing:0.02em;
  }

  #legend{
    position:fixed; bottom:16px; left:16px;
    background:var(--panel-bg);
    border:1px solid rgba(139,123,255,0.25);
    border-radius:10px;
    padding:10px 14px;
    font-size:10.5px;
    z-index:10;
    max-width:220px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 24px rgba(0,229,255,0.06);
  }
  #legend .row{ display:flex; align-items:center; gap:7px; margin:3px 0; cursor:pointer; opacity:0.5; transition:opacity .15s; }
  #legend .row.active{ opacity:1; }
  #legend .row:hover{ opacity:1; }
  #legend .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; box-shadow:0 0 6px currentColor; }
  #legend .title{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px; margin-bottom:6px; color:var(--cyan); text-transform:uppercase; letter-spacing:0.08em; }

  #panel{
    position:fixed; top:0; right:0; bottom:0;
    width:340px;
    background:var(--panel-bg);
    border-left:1px solid rgba(139,123,255,0.25);
    padding:70px 22px 22px;
    overflow-y:auto;
    transform:translateX(100%);
    transition:transform .28s ease;
    z-index:20;
    backdrop-filter:blur(10px);
    box-shadow:-8px 0 32px rgba(0,0,0,0.4);
  }
  #panel.open{ transform:translateX(0); }
  #panel .close{
    position:absolute; top:20px; right:20px;
    cursor:pointer; font-size:20px; color:var(--dust);
    line-height:1; padding:4px;
  }
  #panel .close:hover{ color:var(--ink); }
  #panel .domain-tag{
    display:inline-block; font-size:10px; padding:3px 10px;
    border-radius:20px; border:1px solid currentColor;
    margin-bottom:10px; font-family:'JetBrains Mono',monospace; letter-spacing:0.03em;
    box-shadow:0 0 10px currentColor, inset 0 0 6px currentColor;
  }
  #panel h2{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:21px; margin:0 0 4px 0; color:var(--ink);
    line-height:1.3;
  }
  #panel .meta{ font-size:10.5px; color:var(--dust); margin-bottom:14px; }
  #panel .desc{ font-size:12.5px; line-height:1.7; color:#c6cce0; margin-bottom:16px; }
  #panel h3{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:var(--cyan);
    margin:18px 0 8px 0; border-bottom:1px solid rgba(0,229,255,0.2); padding-bottom:5px;
    text-transform:uppercase; letter-spacing:0.06em;
  }
  #panel ul{ margin:0; padding-left:18px; font-size:11.5px; line-height:1.9; color:#c6cce0; }
  #panel .prereq-item{
    font-size:11.5px; padding:8px 10px; margin-bottom:6px;
    background:rgba(139,123,255,0.06); border-radius:6px; border-left:2px solid var(--violet);
    cursor:pointer; transition:background .15s;
  }
  #panel .prereq-item:hover{ background:rgba(139,123,255,0.14); }
  #panel .prereq-item .reason{ font-size:10px; color:var(--dust); margin-top:3px; }
  #panel .empty-note{ font-size:11px; color:var(--dust); font-style:italic; }

  #search{
    position:fixed; top:20px; right:24px; z-index:15;
    background:var(--panel-bg); border:1px solid rgba(139,123,255,0.3); border-radius:20px;
    padding:7px 14px; font-size:12px; color:var(--ink);
    width:200px; font-family:'JetBrains Mono',monospace;
  }
  #search::placeholder{ color:var(--dust); }
  #search:focus{ outline:none; border-color:var(--cyan); box-shadow:0 0 12px rgba(0,229,255,0.3); }

  #hint{
    position:fixed; bottom:16px; right:16px; z-index:10;
    font-size:10.5px; color:var(--dust); text-align:right;
    max-width:220px; line-height:1.6;
  }

  .node-label{
    font-family:'JetBrains Mono', monospace;
    font-size:9px;
    fill:#aab3d1;
    pointer-events:none;
    user-select:none;
    paint-order:stroke;
    stroke:var(--bg);
    stroke-width:3px;
    stroke-linejoin:round;
  }
  .link-line{ stroke:var(--violet); stroke-opacity:0.15; }
  .link-line.highlight{ stroke:var(--cyan); stroke-opacity:0.95; stroke-width:1.8; filter:drop-shadow(0 0 3px var(--cyan)); }
  .node-dot{ cursor:pointer; stroke:var(--bg); stroke-width:1.2; filter:drop-shadow(0 0 4px currentColor); }
  .node-dot.dim{ opacity:0.1; filter:none; }
  .node-dot.hi{ stroke:var(--ink); stroke-width:2; filter:drop-shadow(0 0 10px currentColor); }
  .node-label.dim{ opacity:0; }

  #tabs{ pointer-events:all; margin-top:8px; display:flex; gap:8px; }
  .tab-btn{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12px; padding:6px 16px;
    background:rgba(139,123,255,0.08); border:1px solid rgba(139,123,255,0.3); border-radius:20px;
    color:var(--dust); cursor:pointer; letter-spacing:0.02em;
  }
  .tab-btn.active{ background:linear-gradient(90deg, var(--cyan), var(--violet)); color:var(--bg-edge); border-color:transparent; box-shadow:0 0 16px rgba(0,229,255,0.35); }
  .tab-btn:hover:not(.active){ background:rgba(139,123,255,0.18); color:var(--ink); }

  #matches-view{ display:none; position:fixed; top:118px; left:0; right:0; bottom:0; padding:0 24px 24px; overflow:auto; }
  #matches-view.active{ display:block; }
  #matches-toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  #matches-toolbar input, #matches-toolbar select{
    font-family:'JetBrains Mono',monospace; font-size:12px; padding:6px 12px;
    background:var(--panel-bg); border:1px solid rgba(139,123,255,0.3); border-radius:6px; color:var(--ink);
  }
  #matches-count{ color:var(--cyan); font-size:13px; margin-left:auto; }
  #matches-table-wrap{ background:rgba(139,123,255,0.04); border-radius:10px; overflow:hidden; border:1px solid rgba(139,123,255,0.15); }
  #matches-table{ width:100%; border-collapse:collapse; font-size:11.5px; }
  #matches-table th{
    text-align:left; padding:9px 10px; background:var(--bg-edge);
    color:var(--cyan); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px;
    position:sticky; top:0; text-transform:uppercase; letter-spacing:0.04em;
  }
  #matches-table td{ padding:7px 10px; border-bottom:1px solid rgba(139,123,255,0.1); vertical-align:top; }
  #matches-table tr:hover td{ background:rgba(139,123,255,0.08); }
  .match-row{ cursor:pointer; }
  .conf-badge{ padding:2px 9px; border-radius:10px; font-size:10px; font-weight:bold; }
  .conf-high{ background:rgba(45,224,194,0.18); color:var(--teal); }
  .conf-mid{ background:rgba(255,176,32,0.18); color:var(--amber); }
  .conf-low{ background:rgba(255,107,107,0.18); color:var(--coral); }

  #cross-panel{
    position:fixed; bottom:16px; left:254px;
    background:var(--panel-bg); border:1px solid rgba(139,123,255,0.25); border-radius:10px;
    padding:10px 14px; font-size:10.5px; z-index:10; max-width:230px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 24px rgba(255,47,184,0.06);
  }
  #cross-panel .title{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px; color:var(--magenta); text-transform:uppercase; letter-spacing:0.06em; }
  #cross-panel input[type="checkbox"]{ accent-color: var(--magenta); }
  #cross-subject-rows{ margin-top:6px; display:none; }
  #cross-subject-rows.open{ display:block; }
  #cross-subject-rows .row{ display:flex; align-items:center; gap:7px; margin:3px 0; cursor:pointer; opacity:0.5; transition:opacity .15s; }
  #cross-subject-rows .row.active{ opacity:1; }
  #cross-subject-rows .row:hover{ opacity:1; }
  #cross-subject-rows .dot{ width:8px; height:8px; transform:rotate(45deg); flex-shrink:0; border:1.5px solid currentColor; background:transparent; box-shadow:0 0 6px currentColor; }

  .ext-node{ cursor:pointer; filter:drop-shadow(0 0 5px currentColor); }
  .ext-link{ stroke-dasharray: 3,3; stroke-opacity:0.6; }
  .ext-label{ font-family:'JetBrains Mono',monospace; font-size:8px; fill:var(--dust); pointer-events:none; font-style:italic; }
</style>

</head>
<body>

<div id="header">
  <h1 class="hand">數學科知識地圖 · Prerequisite Graph</h1>
  <p>Marble os-taxonomy · Mathematics · 503 micro-topics（全數學科已中文化）· 985 條先備關係 — 點節點看詳情與先備鏈</p>
  <div id="tabs">
    <button class="tab-btn active" data-tab="graph">知識地圖</button>
    <button class="tab-btn" data-tab="matches">AIDA 比對總覽 (190節)</button>
  </div>
</div>

<input id="search" type="text" placeholder="搜尋知識點名稱...">

<svg id="stage"></svg>

<div id="matches-view">
  <div id="matches-toolbar">
    <input id="matches-search" type="text" placeholder="搜尋節、章、知識點...">
    <select id="matches-conf-filter">
      <option value="all">全部信心度</option>
      <option value="high">高 (≥0.55)</option>
      <option value="mid">中 (0.32–0.55)</option>
      <option value="low">低 (&lt;0.32)</option>
    </select>
    <select id="matches-grade-filter">
      <option value="all">全部年級</option>
    </select>
    <span id="matches-count" class="hand"></span>
  </div>
  <div id="matches-table-wrap">
    <table id="matches-table">
      <thead>
        <tr>
          <th>年級</th><th>章</th><th>節</th><th>108課綱代碼</th>
          <th>比對到的 Marble 節點</th><th>分數</th><th>信心度</th>
        </tr>
      </thead>
      <tbody id="matches-tbody"></tbody>
    </table>
  </div>
</div>

<div id="legend">
  <div class="title">領域 Domain</div>
  <div id="legend-rows"></div>
</div>

<div id="cross-panel">
  <div class="title">
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="cross-toggle"> 跨科連結 Cross-subject
    </label>
  </div>
  <div id="cross-subject-rows"></div>
</div>

<div id="hint">拖曳空白處可平移畫布<br>滾輪放大可顯示更多節點文字<br>點節點展開詳情</div>

<div id="panel">
  <div class="close" onclick="closePanel()">✕</div>
  <div id="panel-content"></div>
</div>

<script src="./data-embed.js"></script>
<script src="./section-matches-data.js"></script>
<script>
const raw = window.__TAXONOMY_DATA__;
const nodes = raw.topics.map(d => ({...d}));
const links = raw.links.map(d => ({...d}));

const nodeById = new Map(nodes.map(n => [n.id, n]));
const inbound = new Map();  // prereqs for a node
const outbound = new Map(); // things that depend on this node
links.forEach(l => {
  if(!inbound.has(l.target)) inbound.set(l.target, []);
  inbound.get(l.target).push(l);
  if(!outbound.has(l.source)) outbound.set(l.source, []);
  outbound.get(l.source).push(l);
});

const domains = [...new Set(nodes.map(n => n.domain))].sort();
const domainZhMap = {};
nodes.forEach(n => { if(n.domain_zh) domainZhMap[n.domain] = n.domain_zh; });
const chalkColors = ['#00e5ff','#ff2fb8','#baff29','#8b7bff','#ffb020','#2de0c2','#ff6b6b','#5ce1ff','#c77dff','#ffe066','#4dd4ac','#ff8fa3'];
const colorScale = d3.scaleOrdinal().domain(domains).range(chalkColors);

const activeDomains = new Set(domains);

// legend
const legendRows = d3.select('#legend-rows');
domains.forEach(dom => {
  const row = legendRows.append('div').attr('class','row active').attr('data-domain', dom)
    .on('click', () => toggleDomain(dom));
  row.append('div').attr('class','dot').style('background', colorScale(dom));
  row.append('div').text(domainZhMap[dom] || dom);
});
function toggleDomain(dom){
  if(activeDomains.has(dom)) activeDomains.delete(dom); else activeDomains.add(dom);
  d3.select(`.row[data-domain="${dom}"]`).classed('active', activeDomains.has(dom));
  render();
}

// ===== Cross-subject external nodes =====
const externalTopicsRaw = raw.externalTopics || [];
const crossLinksRaw = raw.crossLinks || [];
const externalSubjects = [...new Set(externalTopicsRaw.map(n => n.subject_zh))];
const extColorScale = d3.scaleOrdinal().domain(externalSubjects).range(['#ffb020','#00e5ff','#ff6b6b','#baff29','#c77dff','#2de0c2','#ffe066']);
let showCrossLinks = false;
const activeExternalSubjects = new Set(externalSubjects);

const crossRows = d3.select('#cross-subject-rows');
externalSubjects.forEach(sub => {
  const count = crossLinksRaw.filter(l => l.other_subject === sub).length;
  const row = crossRows.append('div').attr('class','row active').attr('data-subject', sub)
    .on('click', () => toggleExternalSubject(sub));
  row.append('div').attr('class','dot').style('color', extColorScale(sub));
  row.append('div').text(`${sub} (${count})`);
});
function toggleExternalSubject(sub){
  if(activeExternalSubjects.has(sub)) activeExternalSubjects.delete(sub); else activeExternalSubjects.add(sub);
  d3.select(`#cross-subject-rows .row[data-subject="${sub}"]`).classed('active', activeExternalSubjects.has(sub));
  render();
}
d3.select('#cross-toggle').on('change', function(){
  showCrossLinks = this.checked;
  d3.select('#cross-subject-rows').classed('open', showCrossLinks);
  render();
});

const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select('#stage').attr('viewBox', [0,0,width,height]);
const g = svg.append('g');

let currentZoomK = 1;
svg.call(d3.zoom().scaleExtent([0.15, 6]).on('zoom', (ev) => {
  g.attr('transform', ev.transform);
  currentZoomK = ev.transform.k;
  updateLabelVisibility();
}));

function updateLabelVisibility(){
  const baseThreshold = 7;
  labelSel.selectAll('text')
    .style('display', d => (radiusScale(d.centrality||0.01) * currentZoomK > baseThreshold) ? null : 'none');
  extLabelSel.selectAll('text')
    .style('display', currentZoomK > 1.8 ? null : 'none');
}

const crossLinkSel = g.append('g').attr('class','cross-links');
const linkSel = g.append('g').attr('class','links');
const nodeSel = g.append('g').attr('class','nodes');
const extNodeSel = g.append('g').attr('class','ext-nodes');
const labelSel = g.append('g').attr('class','labels');
const extLabelSel = g.append('g').attr('class','ext-labels');

const radiusScale = d3.scaleSqrt().domain(d3.extent(nodes, d => d.centrality || 0.01)).range([3, 13]);

// anchor positions for external-subject clusters, arranged in a ring outside the main graph
const subjectAnchor = {};
externalSubjects.forEach((sub, i) => {
  const angle = (i / externalSubjects.length) * 2 * Math.PI;
  subjectAnchor[sub] = {
    x: width/2 + Math.cos(angle) * (Math.min(width,height)/2 - 60),
    y: height/2 + Math.sin(angle) * (Math.min(height,width)/2 - 60)
  };
});


const extNodes = externalTopicsRaw.map(n => ({
  ...n,
  x: subjectAnchor[n.subject_zh].x + (Math.random()-0.5)*40,
  y: subjectAnchor[n.subject_zh].y + (Math.random()-0.5)*40
}));
const extNodeById = new Map(extNodes.map(n => [n.id, n]));

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(38).strength(0.35))
  .force('charge', d3.forceManyBody().strength(d => d.external ? -20 : -42))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collide', d3.forceCollide().radius(d => d.external ? 6 : radiusScale(d.centrality||0.01) + 3))
  .force('x', d3.forceX(d => d.external ? subjectAnchor[d.subject_zh].x : width/2).strength(d => d.external ? 0.12 : 0.02))
  .force('y', d3.forceY(d => d.external ? subjectAnchor[d.subject_zh].y : 60 + (d.ageStart||6) * 55).strength(d => d.external ? 0.12 : 0.15));

let selectedId = null;

render();

function render(){
  const visibleNodes = nodes.filter(n => activeDomains.has(n.domain));
  const visibleIds = new Set(visibleNodes.map(n=>n.id));
  const visibleLinks = links.filter(l => visibleIds.has(l.source.id||l.source) && visibleIds.has(l.target.id||l.target));

  const visibleExtNodes = showCrossLinks ? extNodes.filter(n => activeExternalSubjects.has(n.subject_zh)) : [];
  const visibleExtIds = new Set(visibleExtNodes.map(n=>n.id));
  const visibleCrossLinks = showCrossLinks ? crossLinksRaw.filter(l =>
    visibleExtIds.has(l.source) && visibleIds.has(l.target) ||
    visibleExtIds.has(l.target) && visibleIds.has(l.source)
  ) : [];

  const link = linkSel.selectAll('line').data(visibleLinks, d => (d.source.id||d.source)+'-'+(d.target.id||d.target));
  link.exit().remove();
  link.enter().append('line').attr('class','link-line').merge(link);

  const crossLink = crossLinkSel.selectAll('line').data(visibleCrossLinks, d => d.source+'-'+d.target);
  crossLink.exit().remove();
  crossLink.enter().append('line').attr('class','link-line ext-link')
    .attr('stroke', d => extColorScale(d.other_subject))
    .merge(crossLink);

  const node = nodeSel.selectAll('circle').data(visibleNodes, d => d.id);
  node.exit().remove();
  const nodeEnter = node.enter().append('circle')
    .attr('class','node-dot')
    .attr('r', d => radiusScale(d.centrality||0.01))
    .attr('fill', d => colorScale(d.domain))
    .on('click', (ev,d) => selectNode(d.id))
    .call(drag(simulation));
  nodeEnter.append('title').text(d => d.name_zh ? `${d.name_zh} / ${d.name}` : d.name);
  nodeEnter.merge(node);

  const extNode = extNodeSel.selectAll('rect').data(visibleExtNodes, d => d.id);
  extNode.exit().remove();
  const extNodeEnter = extNode.enter().append('rect')
    .attr('class','node-dot ext-node')
    .attr('width', 10).attr('height', 10)
    .attr('fill', d => extColorScale(d.subject_zh))
    .attr('fill-opacity', 0.35)
    .attr('stroke', d => extColorScale(d.subject_zh))
    .on('click', (ev,d) => selectExternalNode(d.id))
    .call(drag(simulation));
  extNodeEnter.append('title').text(d => `[${d.subject_zh}] ${d.name_zh || d.name}`);
  extNodeEnter.merge(extNode);

  const label = labelSel.selectAll('text').data(visibleNodes, d => d.id);
  label.exit().remove();
  label.enter().append('text').attr('class','node-label').text(d=>d.name_zh || d.name).merge(label);

  const extLabel = extLabelSel.selectAll('text').data(visibleExtNodes, d => d.id);
  extLabel.exit().remove();
  extLabel.enter().append('text').attr('class','ext-label').text(d=>`[${d.subject_zh}] ${d.name_zh||d.name}`).merge(extLabel);

  simulation.nodes([...visibleNodes, ...visibleExtNodes]);
  simulation.force('link').links([...visibleLinks, ...visibleCrossLinks.map(l=>({...l, id_pair:true}))]);
  simulation.alpha(0.6).restart();
  updateLabelVisibility();
}

simulation.on('tick', () => {
  linkSel.selectAll('line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  crossLinkSel.selectAll('line')
    .attr('x1', d => (extNodeById.get(d.source) || nodeById.get(d.source) || {}).x)
    .attr('y1', d => (extNodeById.get(d.source) || nodeById.get(d.source) || {}).y)
    .attr('x2', d => (extNodeById.get(d.target) || nodeById.get(d.target) || {}).x)
    .attr('y2', d => (extNodeById.get(d.target) || nodeById.get(d.target) || {}).y);
  nodeSel.selectAll('circle')
    .attr('cx', d => d.x).attr('cy', d => d.y);
  extNodeSel.selectAll('rect')
    .attr('x', d => d.x - 5).attr('y', d => d.y - 5)
    .attr('transform', d => `rotate(45, ${d.x}, ${d.y})`);
  labelSel.selectAll('text')
    .attr('x', d => d.x + 10).attr('y', d => d.y + 3);
  extLabelSel.selectAll('text')
    .attr('x', d => d.x + 9).attr('y', d => d.y + 3);
});

function drag(sim){
  function started(ev,d){ if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(ev,d){ d.fx=ev.x; d.fy=ev.y; }
  function ended(ev,d){ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }
  return d3.drag().on('start',started).on('drag',dragged).on('end',ended);
}

function selectNode(id){
  selectedId = id;
  const node = nodeById.get(id);
  const prereqs = (inbound.get(id) || []).map(l => ({...l, node: nodeById.get(l.source.id||l.source)}));
  const dependents = (outbound.get(id) || []).map(l => ({...l, node: nodeById.get(l.target.id||l.target)}));
  const crossLinksForNode = crossLinksRaw.filter(l => l.source === id || l.target === id)
    .map(l => ({...l, extNode: extNodeById.get(l.source === id ? l.target : l.source)}));

  const translated = !!node.name_zh;
  d3.select('#panel-content').html(`
    <div class="domain-tag hand" style="color:${colorScale(node.domain)}">${node.domain_zh || node.domain}${translated ? ' · 已翻譯' : ''}</div>
    <h2 class="hand">${node.name_zh || node.name}</h2>
    ${translated ? `<div class="meta" style="color:var(--dust)">EN: ${node.name}</div>` : ''}
    <div class="meta">${node.type} · 年齡 ${node.ageStart}–${node.ageEnd} 歲 · centrality ${(node.centrality*100).toFixed(1)}</div>
    <div class="desc">${node.description_zh || node.description || ''}</div>
    ${translated && node.description_zh ? `<div class="desc" style="color:var(--dust); font-size:11px;">EN: ${node.description}</div>` : ''}
    ${node.evidence && node.evidence.length ? `
      <h3>掌握指標 Evidence${node.evidence_zh ? '' : ' <span style="font-size:10px;color:var(--dust);font-weight:normal;">(尚未翻譯)</span>'}</h3>
      <ul>${(node.evidence_zh || node.evidence).map(e=>`<li>${e}</li>`).join('')}</ul>
    ` : ''}
    <h3>先備知識 Prerequisites (${prereqs.length})</h3>
    ${prereqs.length ? prereqs.map(p => `
      <div class="prereq-item" data-id="${p.node.id}">
        <b>${p.node.name_zh || p.node.name}</b> <span style="color:var(--dust); font-size:10px;">[${p.strength}]</span>
        <div class="reason">${p.reason_zh || p.reason}</div>
      </div>`).join('') : '<div class="empty-note">沒有先備知識，這是起點概念</div>'}
    <h3>後續延伸 Leads to (${dependents.length})</h3>
    ${dependents.length ? dependents.map(p => `
      <div class="prereq-item" data-id="${p.node.id}" style="border-left-color:var(--lime)">
        <b>${p.node.name_zh || p.node.name}</b>
        <div class="reason">${p.reason_zh || p.reason}</div>
      </div>`).join('') : '<div class="empty-note">沒有後續延伸，這是終端概念</div>'}
    ${crossLinksForNode.length ? `
      <h3>跨科關聯 Cross-subject (${crossLinksForNode.length})</h3>
      ${crossLinksForNode.map(c => `
        <div class="prereq-item" style="border-left-color:${extColorScale(c.other_subject)}">
          <span class="conf-badge" style="background:${extColorScale(c.other_subject)}33;color:${extColorScale(c.other_subject)}">${c.other_subject}</span>
          <b>${c.extNode ? (c.extNode.name_zh || c.extNode.name) : ''}</b>
          <div class="reason">${c.reason_zh || c.reason}</div>
        </div>`).join('')}
      <div class="empty-note">開啟左下角「跨科連結」開關可在地圖上看到這些連線</div>
    ` : ''}
  `);

  d3.selectAll('.prereq-item[data-id]').on('click', function(){ selectNode(this.getAttribute('data-id')); });

  d3.select('#panel').classed('open', true);
  highlightChain(id);
}

function selectExternalNode(id){
  const node = extNodeById.get(id);
  d3.select('#panel-content').html(`
    <div class="domain-tag hand" style="color:${extColorScale(node.subject_zh)}">${node.subject_zh} · 跨科節點</div>
    <h2 class="hand">${node.name_zh || node.name}</h2>
    <div class="meta" style="color:var(--dust)">EN: ${node.name}</div>
    <div class="desc">${node.description_zh || ''}</div>
    <div class="empty-note">這是其他科目的節點，與數學科有先備/後續關聯</div>
  `);
  d3.select('#panel').classed('open', true);
}

function closePanel(){
  d3.select('#panel').classed('open', false);
  selectedId = null;
  highlightChain(null);
}

function highlightChain(id){
  if(!id){
    nodeSel.selectAll('circle').classed('dim', false).classed('hi', false);
    labelSel.selectAll('text').classed('dim', false);
    linkSel.selectAll('line').classed('highlight', false);
    return;
  }
  const related = new Set([id]);
  (inbound.get(id)||[]).forEach(l => related.add(l.source.id||l.source));
  (outbound.get(id)||[]).forEach(l => related.add(l.target.id||l.target));

  nodeSel.selectAll('circle')
    .classed('dim', d => !related.has(d.id))
    .classed('hi', d => d.id === id);
  labelSel.selectAll('text')
    .classed('dim', d => !related.has(d.id));
  linkSel.selectAll('line')
    .classed('highlight', d => {
      const s = d.source.id||d.source, t = d.target.id||d.target;
      return (s===id || t===id);
    });
}

d3.select('#search').on('input', function(){
  const q = this.value.trim().toLowerCase();
  if(!q){ nodeSel.selectAll('circle').classed('dim', false); return; }
  nodeSel.selectAll('circle').classed('dim', d => !(d.name.toLowerCase().includes(q) || (d.name_zh||'').includes(q)));
});

// ===== Tabs & AIDA matching view =====
const sectionMatches = window.__SECTION_MATCHES__ || [];
const grades = [...new Set(sectionMatches.map(m=>m.grade))];
grades.forEach(g => d3.select('#matches-grade-filter').append('option').attr('value', g).text(g));

d3.selectAll('.tab-btn').on('click', function(){
  const tab = this.getAttribute('data-tab');
  d3.selectAll('.tab-btn').classed('active', false);
  d3.select(this).classed('active', true);
  d3.select('#matches-view').classed('active', tab === 'matches');
  d3.select('#stage').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#legend').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#search').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#hint').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#cross-panel').style('display', tab === 'graph' ? 'block' : 'none');
});

function renderMatchesTable(){
  const q = d3.select('#matches-search').property('value').trim().toLowerCase();
  const confFilter = d3.select('#matches-conf-filter').property('value');
  const gradeFilter = d3.select('#matches-grade-filter').property('value');

  let filtered = sectionMatches.filter(m => {
    if(confFilter !== 'all' && m.conf !== confFilter) return false;
    if(gradeFilter !== 'all' && m.grade !== gradeFilter) return false;
    if(q && !(m.section.toLowerCase().includes(q) || m.chapter.toLowerCase().includes(q) || m.points.toLowerCase().includes(q) || m.match_zh.toLowerCase().includes(q))) return false;
    return true;
  });

  d3.select('#matches-count').text(`顯示 ${filtered.length} / ${sectionMatches.length} 節`);

  const rows = d3.select('#matches-tbody').selectAll('tr').data(filtered, d => d.grade+d.section);
  rows.exit().remove();
  const enter = rows.enter().append('tr').attr('class','match-row');
  for(let i=0;i<7;i++) enter.append('td');
  const allRows = enter.merge(rows);
  allRows.on('click', (ev,d) => {
    d3.select('.tab-btn[data-tab="graph"]').dispatch('click');
    setTimeout(()=>selectNode(d.match_id), 100);
  });
  allRows.select('td:nth-child(1)').text(d=>d.grade);
  allRows.select('td:nth-child(2)').text(d=>d.chapter);
  allRows.select('td:nth-child(3)').text(d=>d.section);
  allRows.select('td:nth-child(4)').text(d=>d.codes);
  allRows.select('td:nth-child(5)').text(d=>d.match_zh + ' / ' + d.match_en);
  allRows.select('td:nth-child(6)').text(d=>d.score.toFixed(2));
  allRows.select('td:nth-child(7)').html(d=>`<span class="conf-badge conf-${d.conf}">${d.conf==='high'?'高':d.conf==='mid'?'中':'低'}</span>`);
}
d3.select('#matches-search').on('input', renderMatchesTable);
d3.select('#matches-conf-filter').on('change', renderMatchesTable);
d3.select('#matches-grade-filter').on('change', renderMatchesTable);
renderMatchesTable();

</script>
</body>
</html>
