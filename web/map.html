<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學科知識地圖 · Marble Taxonomy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#16302a;
    --board-edge:#0f221d;
    --chalk-white:#f4f1e8;
    --chalk-yellow:#e8d97a;
    --chalk-pink:#e0a3a8;
    --chalk-blue:#8fc4d6;
    --chalk-green:#a8cf9e;
    --chalk-orange:#e0a973;
    --chalk-purple:#b7a3d6;
    --chalk-teal:#7fcbb8;
    --dust:#9fb8ae;
    --panel-bg:#0f221dcc;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--board);
    overflow:hidden;
    font-family:'Space Mono', monospace;
    color:var(--chalk-white);
  }
  body{
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.02) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,0.02) 0%, transparent 40%);
  }
  #stage{ width:100vw; height:100vh; display:block; cursor:grab; }
  #stage:active{ cursor:grabbing; }

  .hand{ font-family:'Kalam', cursive; }

  #header{
    position:fixed; top:0; left:0; right:0;
    padding:18px 24px 12px;
    pointer-events:none;
    z-index:10;
    background:linear-gradient(180deg, var(--board-edge)ee 0%, transparent 100%);
  }
  #header h1{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size:22px;
    margin:0 0 2px 0;
    color:var(--chalk-white);
    text-shadow:0 0 8px rgba(244,241,232,0.15);
  }
  #header p{
    margin:0;
    font-size:11px;
    color:var(--dust);
    letter-spacing:0.02em;
  }

  #legend{
    position:fixed; bottom:16px; left:16px;
    background:var(--panel-bg);
    border:1px solid #ffffff22;
    border-radius:8px;
    padding:10px 14px;
    font-size:10.5px;
    z-index:10;
    max-width:220px;
    backdrop-filter:blur(3px);
  }
  #legend .row{ display:flex; align-items:center; gap:7px; margin:3px 0; cursor:pointer; opacity:0.55; transition:opacity .15s; }
  #legend .row.active{ opacity:1; }
  #legend .row:hover{ opacity:1; }
  #legend .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  #legend .title{ font-family:'Kalam',cursive; font-size:12px; margin-bottom:6px; color:var(--chalk-yellow); }

  #panel{
    position:fixed; top:0; right:0; bottom:0;
    width:340px;
    background:var(--panel-bg);
    border-left:1px solid #ffffff22;
    padding:70px 22px 22px;
    overflow-y:auto;
    transform:translateX(100%);
    transition:transform .28s ease;
    z-index:20;
    backdrop-filter:blur(4px);
  }
  #panel.open{ transform:translateX(0); }
  #panel .close{
    position:absolute; top:20px; right:20px;
    cursor:pointer; font-size:20px; color:var(--dust);
    line-height:1; padding:4px;
  }
  #panel .close:hover{ color:var(--chalk-white); }
  #panel .domain-tag{
    display:inline-block; font-size:10px; padding:2px 8px;
    border-radius:20px; border:1px solid currentColor;
    margin-bottom:10px;
  }
  #panel h2{
    font-family:'Kalam',cursive;
    font-size:21px; margin:0 0 4px 0; color:var(--chalk-white);
    line-height:1.3;
  }
  #panel .meta{ font-size:10.5px; color:var(--dust); margin-bottom:14px; }
  #panel .desc{ font-size:12.5px; line-height:1.7; color:#ddd6c8; margin-bottom:16px; }
  #panel h3{
    font-family:'Kalam',cursive; font-size:14px; color:var(--chalk-yellow);
    margin:18px 0 8px 0; border-bottom:1px dashed #ffffff33; padding-bottom:4px;
  }
  #panel ul{ margin:0; padding-left:18px; font-size:11.5px; line-height:1.9; color:#ddd6c8; }
  #panel .prereq-item{
    font-size:11.5px; padding:7px 9px; margin-bottom:5px;
    background:#ffffff0a; border-radius:5px; border-left:2px solid var(--chalk-blue);
    cursor:pointer;
  }
  #panel .prereq-item:hover{ background:#ffffff14; }
  #panel .prereq-item .reason{ font-size:10px; color:var(--dust); margin-top:3px; font-style:italic; }
  #panel .empty-note{ font-size:11px; color:var(--dust); font-style:italic; }

  #search{
    position:fixed; top:20px; right:24px; z-index:15;
    background:var(--panel-bg); border:1px solid #ffffff22; border-radius:20px;
    padding:7px 14px; font-size:12px; color:var(--chalk-white);
    width:200px; font-family:'Space Mono',monospace;
  }
  #search::placeholder{ color:var(--dust); }
  #search:focus{ outline:none; border-color:var(--chalk-yellow); }

  #hint{
    position:fixed; bottom:16px; right:16px; z-index:10;
    font-size:10.5px; color:var(--dust); text-align:right;
    max-width:220px; line-height:1.6;
  }

  .node-label{
    font-family:'Space Mono', monospace;
    font-size:9px;
    fill:var(--dust);
    pointer-events:none;
    user-select:none;
  }
  .link-line{ stroke:var(--dust); stroke-opacity:0.18; }
  .link-line.highlight{ stroke:var(--chalk-yellow); stroke-opacity:0.9; stroke-width:1.6; }
  .node-dot{ cursor:pointer; stroke:var(--board); stroke-width:1.2; }
  .node-dot.dim{ opacity:0.12; }
  .node-dot.hi{ stroke:var(--chalk-white); stroke-width:2; }

  #tabs{ pointer-events:all; margin-top:8px; display:flex; gap:8px; }
  .tab-btn{
    font-family:'Kalam',cursive; font-size:13px; padding:5px 14px;
    background:#ffffff0f; border:1px solid #ffffff2a; border-radius:20px;
    color:var(--dust); cursor:pointer;
  }
  .tab-btn.active{ background:var(--chalk-yellow); color:var(--board-edge); border-color:var(--chalk-yellow); }
  .tab-btn:hover:not(.active){ background:#ffffff1e; color:var(--chalk-white); }

  #matches-view{ display:none; position:fixed; top:80px; left:0; right:0; bottom:0; padding:0 24px 24px; overflow:auto; }
  #matches-view.active{ display:block; }
  #matches-toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  #matches-toolbar input, #matches-toolbar select{
    font-family:'Space Mono',monospace; font-size:12px; padding:6px 12px;
    background:var(--panel-bg); border:1px solid #ffffff22; border-radius:6px; color:var(--chalk-white);
  }
  #matches-count{ color:var(--chalk-yellow); font-size:13px; margin-left:auto; }
  #matches-table-wrap{ background:#ffffff06; border-radius:8px; overflow:hidden; }
  #matches-table{ width:100%; border-collapse:collapse; font-size:11.5px; }
  #matches-table th{
    text-align:left; padding:8px 10px; background:var(--board-edge);
    color:var(--chalk-yellow); font-family:'Kalam',cursive; font-size:12px;
    position:sticky; top:0;
  }
  #matches-table td{ padding:7px 10px; border-bottom:1px solid #ffffff0f; vertical-align:top; }
  #matches-table tr:hover td{ background:#ffffff0a; }
  .match-row{ cursor:pointer; }
  .conf-badge{ padding:2px 8px; border-radius:10px; font-size:10px; font-weight:bold; }
  .conf-high{ background:#a8cf9e33; color:#a8cf9e; }
  .conf-mid{ background:#e8d97a33; color:#e8d97a; }
  .conf-low{ background:#e0a3a833; color:#e0a3a8; }
</style>
</head>
<body>

<div id="header">
  <h1 class="hand">數學科知識地圖 · Prerequisite Graph</h1>
  <p>Marble os-taxonomy · Mathematics · 503 micro-topics（全數學科已中文化）· 985 條先備關係 — 點節點看詳情與先備鏈</p>
  <div id="tabs">
    <button class="tab-btn active" data-tab="graph">知識地圖</button>
    <button class="tab-btn" data-tab="matches">AIDA 比對總覽 (190節)</button>
  </div>
</div>

<input id="search" type="text" placeholder="搜尋知識點名稱...">

<svg id="stage"></svg>

<div id="matches-view">
  <div id="matches-toolbar">
    <input id="matches-search" type="text" placeholder="搜尋節、章、知識點...">
    <select id="matches-conf-filter">
      <option value="all">全部信心度</option>
      <option value="high">高 (≥0.55)</option>
      <option value="mid">中 (0.32–0.55)</option>
      <option value="low">低 (&lt;0.32)</option>
    </select>
    <select id="matches-grade-filter">
      <option value="all">全部年級</option>
    </select>
    <span id="matches-count" class="hand"></span>
  </div>
  <div id="matches-table-wrap">
    <table id="matches-table">
      <thead>
        <tr>
          <th>年級</th><th>章</th><th>節</th><th>108課綱代碼</th>
          <th>比對到的 Marble 節點</th><th>分數</th><th>信心度</th>
        </tr>
      </thead>
      <tbody id="matches-tbody"></tbody>
    </table>
  </div>
</div>

<div id="legend">
  <div class="title">領域 Domain</div>
  <div id="legend-rows"></div>
</div>

<div id="hint">拖曳空白處可平移畫布<br>滾輪縮放 · 點節點展開詳情</div>

<div id="panel">
  <div class="close" onclick="closePanel()">✕</div>
  <div id="panel-content"></div>
</div>

<script src="./data-embed-v6.js"></script>
<script src="./section-matches-data.js"></script>
<script>
const raw = window.__TAXONOMY_DATA__;
const nodes = raw.topics.map(d => ({...d}));
const links = raw.links.map(d => ({...d}));

const nodeById = new Map(nodes.map(n => [n.id, n]));
const inbound = new Map();  // prereqs for a node
const outbound = new Map(); // things that depend on this node
links.forEach(l => {
  if(!inbound.has(l.target)) inbound.set(l.target, []);
  inbound.get(l.target).push(l);
  if(!outbound.has(l.source)) outbound.set(l.source, []);
  outbound.get(l.source).push(l);
});

const domains = [...new Set(nodes.map(n => n.domain))].sort();
const domainZhMap = {};
nodes.forEach(n => { if(n.domain_zh) domainZhMap[n.domain] = n.domain_zh; });
const chalkColors = ['#f4f1e8','#e8d97a','#e0a3a8','#8fc4d6','#a8cf9e','#e0a973','#b7a3d6','#7fcbb8','#c9a678','#9fd6e8','#e8b8d6','#c4d68f'];
const colorScale = d3.scaleOrdinal().domain(domains).range(chalkColors);

const activeDomains = new Set(domains);

// legend
const legendRows = d3.select('#legend-rows');
domains.forEach(dom => {
  const row = legendRows.append('div').attr('class','row active').attr('data-domain', dom)
    .on('click', () => toggleDomain(dom));
  row.append('div').attr('class','dot').style('background', colorScale(dom));
  row.append('div').text(domainZhMap[dom] || dom);
});
function toggleDomain(dom){
  if(activeDomains.has(dom)) activeDomains.delete(dom); else activeDomains.add(dom);
  d3.select(`.row[data-domain="${dom}"]`).classed('active', activeDomains.has(dom));
  render();
}

const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select('#stage').attr('viewBox', [0,0,width,height]);
const g = svg.append('g');

svg.call(d3.zoom().scaleExtent([0.15, 6]).on('zoom', (ev) => g.attr('transform', ev.transform)));

const linkSel = g.append('g').attr('class','links');
const nodeSel = g.append('g').attr('class','nodes');
const labelSel = g.append('g').attr('class','labels');

const radiusScale = d3.scaleSqrt().domain(d3.extent(nodes, d => d.centrality || 0.01)).range([3, 13]);

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(38).strength(0.35))
  .force('charge', d3.forceManyBody().strength(-42))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collide', d3.forceCollide().radius(d => radiusScale(d.centrality||0.01) + 3))
  .force('x', d3.forceX(width/2).strength(0.02))
  .force('y', d3.forceY(d => 60 + (d.ageStart||6) * 55).strength(0.15));

let selectedId = null;

render();

function render(){
  const visibleNodes = nodes.filter(n => activeDomains.has(n.domain));
  const visibleIds = new Set(visibleNodes.map(n=>n.id));
  const visibleLinks = links.filter(l => visibleIds.has(l.source.id||l.source) && visibleIds.has(l.target.id||l.target));

  const link = linkSel.selectAll('line').data(visibleLinks, d => (d.source.id||d.source)+'-'+(d.target.id||d.target));
  link.exit().remove();
  link.enter().append('line').attr('class','link-line').merge(link);

  const node = nodeSel.selectAll('circle').data(visibleNodes, d => d.id);
  node.exit().remove();
  const nodeEnter = node.enter().append('circle')
    .attr('class','node-dot')
    .attr('r', d => radiusScale(d.centrality||0.01))
    .attr('fill', d => colorScale(d.domain))
    .on('click', (ev,d) => selectNode(d.id))
    .call(drag(simulation));
  nodeEnter.append('title').text(d => d.name_zh ? `${d.name_zh} / ${d.name}` : d.name);
  nodeEnter.merge(node);

  const label = labelSel.selectAll('text').data(visibleNodes.filter(d=>radiusScale(d.centrality||0.01) > 7), d => d.id);
  label.exit().remove();
  label.enter().append('text').attr('class','node-label').text(d=>d.name_zh || d.name).merge(label);

  simulation.nodes(visibleNodes);
  simulation.force('link').links(visibleLinks);
  simulation.alpha(0.6).restart();
}

simulation.on('tick', () => {
  linkSel.selectAll('line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeSel.selectAll('circle')
    .attr('cx', d => d.x).attr('cy', d => d.y);
  labelSel.selectAll('text')
    .attr('x', d => d.x + 10).attr('y', d => d.y + 3);
});

function drag(sim){
  function started(ev,d){ if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(ev,d){ d.fx=ev.x; d.fy=ev.y; }
  function ended(ev,d){ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }
  return d3.drag().on('start',started).on('drag',dragged).on('end',ended);
}

function selectNode(id){
  selectedId = id;
  const node = nodeById.get(id);
  const prereqs = (inbound.get(id) || []).map(l => ({...l, node: nodeById.get(l.source.id||l.source)}));
  const dependents = (outbound.get(id) || []).map(l => ({...l, node: nodeById.get(l.target.id||l.target)}));

  const translated = !!node.name_zh;
  d3.select('#panel-content').html(`
    <div class="domain-tag hand" style="color:${colorScale(node.domain)}">${node.domain_zh || node.domain}${translated ? ' · 已翻譯' : ''}</div>
    <h2 class="hand">${node.name_zh || node.name}</h2>
    ${translated ? `<div class="meta" style="color:var(--dust)">EN: ${node.name}</div>` : ''}
    <div class="meta">${node.type} · 年齡 ${node.ageStart}–${node.ageEnd} 歲 · centrality ${(node.centrality*100).toFixed(1)}</div>
    <div class="desc">${node.description_zh || node.description || ''}</div>
    ${translated && node.description_zh ? `<div class="desc" style="color:var(--dust); font-size:11px;">EN: ${node.description}</div>` : ''}
    ${node.evidence && node.evidence.length ? `
      <h3>掌握指標 Evidence${node.evidence_zh ? '' : ' <span style="font-size:10px;color:var(--dust);font-weight:normal;">(尚未翻譯)</span>'}</h3>
      <ul>${(node.evidence_zh || node.evidence).map(e=>`<li>${e}</li>`).join('')}</ul>
    ` : ''}
    <h3>先備知識 Prerequisites (${prereqs.length})</h3>
    ${prereqs.length ? prereqs.map(p => `
      <div class="prereq-item" data-id="${p.node.id}">
        <b>${p.node.name_zh || p.node.name}</b> <span style="color:var(--dust); font-size:10px;">[${p.strength}]</span>
        <div class="reason">${p.reason_zh || p.reason}</div>
      </div>`).join('') : '<div class="empty-note">沒有先備知識，這是起點概念</div>'}
    <h3>後續延伸 Leads to (${dependents.length})</h3>
    ${dependents.length ? dependents.map(p => `
      <div class="prereq-item" data-id="${p.node.id}" style="border-left-color:var(--chalk-green)">
        <b>${p.node.name_zh || p.node.name}</b>
        <div class="reason">${p.reason_zh || p.reason}</div>
      </div>`).join('') : '<div class="empty-note">沒有後續延伸，這是終端概念</div>'}
  `);

  d3.selectAll('.prereq-item').on('click', function(){ selectNode(this.getAttribute('data-id')); });

  d3.select('#panel').classed('open', true);
  highlightChain(id);
}

function closePanel(){
  d3.select('#panel').classed('open', false);
  selectedId = null;
  highlightChain(null);
}

function highlightChain(id){
  if(!id){
    nodeSel.selectAll('circle').classed('dim', false).classed('hi', false);
    linkSel.selectAll('line').classed('highlight', false);
    return;
  }
  const related = new Set([id]);
  (inbound.get(id)||[]).forEach(l => related.add(l.source.id||l.source));
  (outbound.get(id)||[]).forEach(l => related.add(l.target.id||l.target));

  nodeSel.selectAll('circle')
    .classed('dim', d => !related.has(d.id))
    .classed('hi', d => d.id === id);
  linkSel.selectAll('line')
    .classed('highlight', d => {
      const s = d.source.id||d.source, t = d.target.id||d.target;
      return (s===id || t===id);
    });
}

d3.select('#search').on('input', function(){
  const q = this.value.trim().toLowerCase();
  if(!q){ nodeSel.selectAll('circle').classed('dim', false); return; }
  nodeSel.selectAll('circle').classed('dim', d => !(d.name.toLowerCase().includes(q) || (d.name_zh||'').includes(q)));
});

// ===== Tabs & AIDA matching view =====
const sectionMatches = window.__SECTION_MATCHES__ || [];
const grades = [...new Set(sectionMatches.map(m=>m.grade))];
grades.forEach(g => d3.select('#matches-grade-filter').append('option').attr('value', g).text(g));

d3.selectAll('.tab-btn').on('click', function(){
  const tab = this.getAttribute('data-tab');
  d3.selectAll('.tab-btn').classed('active', false);
  d3.select(this).classed('active', true);
  d3.select('#matches-view').classed('active', tab === 'matches');
  d3.select('#stage').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#legend').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#search').style('display', tab === 'graph' ? 'block' : 'none');
  d3.select('#hint').style('display', tab === 'graph' ? 'block' : 'none');
});

function renderMatchesTable(){
  const q = d3.select('#matches-search').property('value').trim().toLowerCase();
  const confFilter = d3.select('#matches-conf-filter').property('value');
  const gradeFilter = d3.select('#matches-grade-filter').property('value');

  let filtered = sectionMatches.filter(m => {
    if(confFilter !== 'all' && m.conf !== confFilter) return false;
    if(gradeFilter !== 'all' && m.grade !== gradeFilter) return false;
    if(q && !(m.section.toLowerCase().includes(q) || m.chapter.toLowerCase().includes(q) || m.points.toLowerCase().includes(q) || m.match_zh.toLowerCase().includes(q))) return false;
    return true;
  });

  d3.select('#matches-count').text(`顯示 ${filtered.length} / ${sectionMatches.length} 節`);

  const rows = d3.select('#matches-tbody').selectAll('tr').data(filtered, d => d.grade+d.section);
  rows.exit().remove();
  const enter = rows.enter().append('tr').attr('class','match-row');
  for(let i=0;i<7;i++) enter.append('td');
  const allRows = enter.merge(rows);
  allRows.on('click', (ev,d) => {
    d3.select('.tab-btn[data-tab="graph"]').dispatch('click');
    setTimeout(()=>selectNode(d.match_id), 100);
  });
  allRows.select('td:nth-child(1)').text(d=>d.grade);
  allRows.select('td:nth-child(2)').text(d=>d.chapter);
  allRows.select('td:nth-child(3)').text(d=>d.section);
  allRows.select('td:nth-child(4)').text(d=>d.codes);
  allRows.select('td:nth-child(5)').text(d=>d.match_zh + ' / ' + d.match_en);
  allRows.select('td:nth-child(6)').text(d=>d.score.toFixed(2));
  allRows.select('td:nth-child(7)').html(d=>`<span class="conf-badge conf-${d.conf}">${d.conf==='high'?'高':d.conf==='mid'?'中':'低'}</span>`);
}
d3.select('#matches-search').on('input', renderMatchesTable);
d3.select('#matches-conf-filter').on('change', renderMatchesTable);
d3.select('#matches-grade-filter').on('change', renderMatchesTable);
renderMatchesTable();

</script>
</body>
</html>
